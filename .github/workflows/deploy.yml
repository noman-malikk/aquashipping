name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_QUOTE_API_URL: ${{ vars.VITE_QUOTE_API_URL }}
          VITE_COMPANY_NAME: ${{ vars.VITE_COMPANY_NAME }}
          VITE_COMPANY_PHONE: ${{ vars.VITE_COMPANY_PHONE }}
          VITE_COMPANY_EMAIL: ${{ vars.VITE_COMPANY_EMAIL }}
          VITE_COMPANY_WHATSAPP: ${{ vars.VITE_COMPANY_WHATSAPP }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
